<!DOCTYPE html>
<html>

<head>

    <title>Brain Tumor Detection</title>

    <style>

        body{
            font-family:Arial;
            background:#f2f2f2;
            text-align:center;
        }

        .container{

            width:600px;
            margin:auto;
            margin-top:40px;

            background:white;

            padding:30px;

            border-radius:10px;

            box-shadow:0 0 15px gray;
        }

        h1{

            color:#2c3e50;

        }

        input{

            margin:20px;

        }

        button{

            padding:10px 20px;

            background:#3498db;

            color:white;

            border:none;

            border-radius:5px;

            cursor:pointer;

            font-size:18px;

        }

        button:hover{

            background:#2980b9;

        }

        img{

            width:300px;

            margin-top:20px;

            border-radius:10px;

        }

        h2{

            color:green;

        }

    </style>

</head>

<body>

<div class="container">

<h1>Brain Tumor Detection using Deep Learning</h1>

<form action="/predict" method="POST" enctype="multipart/form-data">

<input type="file" name="image" required>

<br>

<button type="submit">Predict</button>

</form>

{% if prediction %}

<h2>Prediction : {{prediction}}</h2>

<h2>Confidence : {{confidence}}%</h2>

<img src="{{image_path}}">

{% endif %}

</div>

</body>

</html>
